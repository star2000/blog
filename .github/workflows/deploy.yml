on:
  push:
    paths-ignore:
      - .github/workflows/static.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@master
        with:
          node-version: "*"
      - uses: actions/checkout@master
        with:
          submodules: true
      - run: |
          sed -i "s|CODING_TOKEN|${{ secrets.CODING_TOKEN }}|" _config.yml
          npm i --production
          npm run deploy
